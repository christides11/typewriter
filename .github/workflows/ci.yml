name: CI
on:
  push:
    branches:
    - main
jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Semantic release
      id: semantic
      uses: cycjimmy/semantic-release-action@v3.4.2
      with:
        extra_plugins: |
          @semantic-release/changelog
          @semantic-release/git
        branch: main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create upm branch
      run: |
        git branch -d upm &> /dev/null || echo upm branch not found
        git checkout -b upm
        git mv -k Runtime/Quantum.Simulation.asmref Runtime/Quantum.Simulation.asmref~
        git mv -k Runtime/Quantum.Simulation.asmref.meta Runtime/Quantum.Simulation.asmref.meta~
        git mv -k Runtime/Aarthificial.Typewriter.asmdef~ Runtime/Aarthificial.Typewriter.asmdef
        git mv -k Runtime/Aarthificial.Typewriter.asmdef.meta~ Runtime/Aarthificial.Typewriter.asmdef.meta
        if [[ -d "Samples" ]]; then
          git mv Samples Samples~
          rm -f Samples.meta
          git config --global user.name 'github-bot'
          git config --global user.email 'github-bot@users.noreply.github.com'
          git commit -am "fix: Samples => Samples~"
        fi
        git push -f -u origin upm
      env:
        PKG_ROOT: /
    - name: Create upm git tag
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
        git tag $TAG upm
        git push origin --tags
      env:
        TAG: upm/v${{ steps.semantic.outputs.new_release_version }}
  release-quantum:
    name: release-quantum
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Semantic release
      id: semantic
      uses: cycjimmy/semantic-release-action@v3.4.2
      with:
        extra_plugins: |
          @semantic-release/changelog
          @semantic-release/git
        branch: main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Create upmquantum branch
      run: |
        git branch -d upmquantum &> /dev/null || echo upmquantum branch not found
        git status
        git checkout -b upmquantum
        git mv -k Runtime/Quantum.Simulation.asmref~ Runtime/Quantum.Simulation.asmref
        git mv -k Runtime/Quantum.Simulation.asmref.meta~ Runtime/Quantum.Simulation.asmref.meta
        git mv -k Runtime/Aarthificial.Typewriter.asmdef Runtime/Aarthificial.Typewriter.asmdef~
        git mv -k Runtime/Aarthificial.Typewriter.asmdef.meta Runtime/Aarthificial.Typewriter.asmdef.meta~
        if [[ -d "Samples" ]]; then
          git mv Samples Samples~
          rm -f Samples.meta
          git config --global user.name 'github-bot'
          git config --global user.email 'github-bot@users.noreply.github.com'
          git commit -am "fix: Samples => Samples~"
        fi
        git push -f -u origin upmquantum
      env:
        PKG_ROOT: /
    - name: Create upmquantum git tag
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
        git tag $TAG upmquantum
        git push origin --tags
      env:
        TAG: upmquantum/v${{ steps.semantic.outputs.new_release_version }}